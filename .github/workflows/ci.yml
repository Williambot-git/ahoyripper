name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sanity:
    name: Sanity Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check
        run: |
          php -l src/api.php
          php -l public/index.php

      - name: Check required files
        run: |
          for f in src/api.php src/style.css public/index.php README.md Dockerfile docker-compose.yml deploy/nginx.conf scripts/install-deps.sh; do
            if [ ! -f "$f" ]; then echo "Missing: $f"; exit 1; fi
          done

      - name: Check security headers
        run: |
          for header in X-Content-Type-Options X-Frame-Options Strict-Transport-Security Content-Security-Policy X-Download-Options; do
            if ! grep -q "$header" src/api.php; then echo "Missing: $header"; exit 1; fi
          done

      - name: Check rate limiting
        run: |
          grep -q "rate_limit = 30" src/api.php
          grep -q "dl_rate_limit = 10" src/api.php

      - name: Check format_id validation
        run: |
          grep -q "preg_match.*format_id" src/api.php

      - name: Check yt-dlp flags
        run: |
          # --no-warning (singular) is deprecated; --no-warnings (plural) is current
          # The grep below catches the deprecated singular form as a failure.
          # The codebase should use --no-warnings (plural) throughout.
          if grep -q -- '--no-warning$' src/api.php; then echo "FAIL: deprecated --no-warning (singular) found — use --no-warnings"; exit 1; fi

      - name: Check shell injection prevention
        run: |
          # Commands must use proc_open array syntax with bypass_shell to avoid shell injection.
          # The correct pattern is: proc_open($cmd_array, ..., [], [], ['bypass_shell' => true])
          # where $cmd_array has the binary as the first element and args as separate array items.
          # We check for bypass_shell in proc_open calls as the primary indicator.
          # Do NOT use escapeshellarg — it indicates shell-based execution which bypass_shell avoids.
          if grep -q "escapeshellarg" src/api.php; then
            echo "FAIL: escapeshellarg found — use proc_open array syntax with bypass_shell instead"
            exit 1
          fi
          # Verify bypass_shell is used for the critical command execution
          grep -q "bypass_shell.*true" src/api.php

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ahoyripper-test .

      - name: List Docker layers
        run: docker history ahoyripper-test

      - name: Validate container health
        run: |
          # Start the container in the background
          docker run -d --name ahoyripper-health -p 8081:8080 ahoyripper-test
          # Give services inside the container time to start (php-fpm + nginx)
          sleep 5
          # Hit the health endpoint to confirm the API responds
          HEALTH_RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/src/api.php?action=health || echo "000")
          # Confirm nginx is serving the page (200 on index)
          INDEX_RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/ || echo "000")
          # Check custom 404 page is served for unknown routes
          NOTFOUND_RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/nonexistent-route || echo "000")
          # Check no container exited with an error
          docker ps --filter "name=ahoyripper-health" --format "{{.Status}}"
          docker logs ahoyripper-health 2>&1 | tail -5
          # Teardown
          docker kill ahoyripper-health 2>/dev/null || true
          docker rm ahoyripper-health 2>/dev/null || true
          # Fail the step if either endpoint did not respond with 2xx
          if [ "$HEALTH_RESP" -ge 200 ] && [ "$HEALTH_RESP" -lt 300 ]; then
            echo "  ✓ Health endpoint returned $HEALTH_RESP"
          else
            echo "  ✗ Health endpoint returned $HEALTH_RESP (expected 2xx)"
            exit 1
          fi
          if [ "$INDEX_RESP" -ge 200 ] && [ "$INDEX_RESP" -lt 300 ]; then
            echo "  ✓ Index page returned $INDEX_RESP"
          else
            echo "  ✗ Index page returned $INDEX_RESP (expected 2xx)"
            exit 1
          fi
          if [ "$NOTFOUND_RESP" -eq 404 ]; then
            echo "  ✓ Unknown routes return custom 404 ($NOTFOUND_RESP)"
          else
            echo "  ✗ Unknown routes returned $NOTFOUND_RESP (expected 404)"
            exit 1
          fi