services:
  ahoyripper:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TZ=UTC
      - AHOY_UNLIMITED_KEY=${AHOY_UNLIMITED_KEY:-RIPPER2026DEV}
      - AHOY_USER_AGENT=${AHOY_USER_AGENT:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/src/api.php?action=check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M