services:
  ahoyripper:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TZ=UTC
      # AHOY_UNLIMITED_KEY must be set in production — a hardcoded fallback is
      # intentionally NOT provided here. Using the default key in production gives
      # everyone unlimited quota. Generate a secure key with:
      #   openssl rand -hex 32
      # Then pass it via: echo "AHOY_UNLIMITED_KEY=$(openssl rand -hex 32)" > .env
      - AHOY_UNLIMITED_KEY=${AHOY_UNLIMITED_KEY:-}
      - AHOY_USER_AGENT=${AHOY_USER_AGENT:-}
      - COOKIES_PATH=${COOKIES_PATH:-}
      - QUOTA_DAILY=${QUOTA_DAILY:-5}
      - YTDLP_TIMEOUT=${YTDLP_TIMEOUT:-45}
      - YTDLP_DOWNLOAD_TIMEOUT=${YTDLP_DOWNLOAD_TIMEOUT:-300}
      - YTDLP_PATH=${YTDLP_PATH:-}
      - FFPROBE_PATH=${FFPROBE_PATH:-}
      - FFPROBE_TIMEOUT=${FFPROBE_TIMEOUT:-10}
      - DL_RATE_LIMIT=${DL_RATE_LIMIT:-10}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/src/api.php?action=check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
