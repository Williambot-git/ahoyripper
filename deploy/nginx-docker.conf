server {
    listen 8080 default_server;
    server_name _;
    root /app/public;
    index index.php index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS (only over HTTPS - applied at reverse-proxy level in production)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP - restrictive for static page, allows Google Fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://ahoyvpn.com https://*.ahoyvpn.com; connect-src 'self';" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Deny direct access to source files
    location ~ ^/src/ { deny all; }
    location ~ ^/includes/ { deny all; }
    location ~ ^/scripts/ { deny all; }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
    }

    location ~ /\. { deny all; }
}