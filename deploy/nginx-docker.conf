server {
    listen 8080 default_server;
    server_name _;
    root /app/public;
    index index.php index.html;

    # Hide Nginx version
    server_tokens off;

    # Security headers — COOP/CORP must be at server level so add_header in location
    # blocks inherits them (Nginx does not propagate add_header from child blocks).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Request-ID $http_x_request_id always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; frame-src 'none'; form-action 'self'; base-uri 'self';" always;
    # COEP intentionally omitted — require-corp breaks cross-origin image loads
    # (e.g. thumbnails from CDNs) which are common in media rippers.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Redirect www to bare domain to avoid duplicate content / SEO dilution.
    # Covers both brands (ahoyripper and ahoyvpn) even in Docker deployments
    # where TLS termination is handled by an external reverse proxy.
    if ($host = 'www.ahoyripper.com') {
        return 301 https://ahoyripper.com$request_uri;
    }
    if ($host = 'www.ahoyvpn.com') {
        return 301 https://ahoyvpn.com$request_uri;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static asset caching — improves LCP for returning visitors.
    # Server-push Link headers are production-only; Docker serves resources
    # directly and doesn't use HTTP/2 server push, so Cache-Control is the
    # primary mechanism for cache-friendly handling of return visits.
    location = /src/style.css {
        add_header Cache-Control "public, max-age=604800";
    }
    location = / {
        add_header Cache-Control "public, max-age=86400";
    }

    # 404 page for non-existent routes
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Source-file access control — order matters in nginx (first match wins):
    # 1. Explicitly allow /src/api.php (used by the frontend JS to call the API).
    #    The = modifier gives exact-match priority over the dotfile catch-all.
    # 2. Deny all dotfiles (e.g. /src/.env, /.git/config) in one catch-all regex.
    location = /src/api.php {
    }
    location ~ /\. { deny all; }

    # PHP handling — long timeouts for large media rips
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }
}
