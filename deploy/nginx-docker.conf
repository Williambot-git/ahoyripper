http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # IP-based rate limiting zone — 30 requests/second burst allowed per IP.
    # Protects the API endpoint (location = /src/api.php) against burst abuse.
    # The limit is deliberately generous (30 r/s) so legitimate users at high
    # fan-out speeds (e.g. fetching many playlist items rapidly) are not
    # affected. It primarily blocks scripted/deterministic abuse patterns.
    # Note: in Docker (single-tenant), this is less critical — consider also
    # managing rate limits at the docker-compose-level or a reverse proxy.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
}

server {
    listen 8080 default_server http2;
    server_name _;
    root /app/public;
    index index.php index.html;

    # Load MIME types — required because nginx's default_type is application/octet-stream
    # (serves all files as binary instead of their actual MIME type without this).
    include /etc/nginx/mime.types;

    # Hide Nginx version
    server_tokens off;

    # Security headers — COOP/CORP must be at server level so add_header in location
    # blocks inherits them (Nginx does not propagate add_header from child blocks).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Download-Options "noopen" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
    # CSP violation reporting — two mechanisms for cross-browser support:
    # 1. Reporting-Endpoints (modern, Chromium 94+/Firefox 79+) routes violations
    #    via the browser's Reporting API. Without this, Chromium 94+ silently drops
    #    violations even when 'report-to csp-report' is in the CSP header.
    # 2. Report-To is the legacy fallback (pre-Chromium 94). Kept alongside for older
    #    Chromium (84-93) that support report-to but not Reporting-Endpoints.
    #    report-uri covers Safari and older Firefox (<79).
    # api.php sets both headers so the PHP layer is consistent with nginx.
    add_header Reporting-Endpoints "csp-report=\"/csp-report\"" always;
    add_header Report-To "{\"group\":\"csp-report\",\"max_age\":86400,\"endpoints\":[{\"url\":\"/csp-report\"}]}" always;
    # CSP violation report receiver — browser POSTs violation reports here.
    # Handler delegates to api.php?action=csp-report so PHP can sanitise and
    # log the report. The POST body is not parsed by nginx (passed as-is).
    location = /csp-report {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 30s;
        # Suppress X-Powered-By (PHP version) from being forwarded from PHP-FPM.
        # PHP-FPM sends this header by default; fastcgi_hide_header prevents it
        # from reaching the client. Mirrors the hide in the api.php location.
        fastcgi_hide_header X-Powered-By;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-Download-Options "noopen" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # X-Request-ID echoes the correlation ID set by api.php so browsers can
        # include it in support tickets when reporting CSP violations. The client
        # also gets this ID on the HTML page (index.php) and API responses.
        add_header X-Request-ID $http_x_request_id always;
        # Reporting-Endpoints and Report-To must be set here in the location block —
        # in nginx, add_header in a location block replaces (not supplements)
        # server-level headers. Without these, browsers posting to /csp-report
        # won't recognise the endpoint as a CSP violation collector.
        add_header Reporting-Endpoints "csp-report=\"/csp-report\"" always;
        add_header Report-To "{\"group\":\"csp-report\",\"max_age\":86400,\"endpoints\":[{\"url\":\"/csp-report\"}]}" always;
        # CSP for the /csp-report endpoint — required so the browser recognises
        # this location as a CSP violation collector. Without it, Chromium 94+
        # silently drops violations even when 'report-to csp-report' is set.
        # 'unsafe-inline' is needed for inline style attributes (e.g. on the results
        # thumb when JS sets style="display:none" on error). No external scripts
        # are loaded by this endpoint (it returns JSON only).
        # report-to and report-uri ensure violations from this endpoint's own
        # responses are reported to the configured collector.
        # 'upgrade-insecure-requests' is an enforcement directive (no effect in
        # Report-Only mode) so it is only present in the enforcement header.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; font-src 'self'; frame-src 'none'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; report-to csp-report; report-uri /csp-report;" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; frame-ancestors 'none'; frame-src 'none'; worker-src 'self'; object-src 'none'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    }

    # CSP — 'upgrade-insecure-requests' instructs browsers to upgrade HTTP→HTTPS.
    # It has no effect in Report-Only mode so is omitted from that header.
    # The enforcement header includes it for defense-in-depth (the page is already
    # served over HTTPS, so it is redundant but harmless).
    # 'frame-ancestors' and 'form-action' are HTML-only but harmless as defense-in-depth.
    # Report-Only header mirrors the enforcement policy minus:
    #   - upgrade-insecure-requests (no enforcement effect in Report-Only)
    #   - form-action (HTML-only, irrelevant for a JSON API in Report-Only)
    #   - frame-ancestors (HTML-only, irrelevant for a JSON API in Report-Only)
    # Note: the /csp-report location CSP differs because that endpoint serves HTML
    # for the report collector; the server-level CSP here applies to all other routes.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; frame-ancestors 'none'; frame-src 'none'; worker-src 'self'; object-src 'none'; form-action 'self'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; frame-src 'none'; worker-src 'self'; object-src 'none'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    # worker-src 'self' enables ServiceWorkers and SharedWorkers at the server origin
    # (needed for future PWA offline support). Matches the PHP-layer and production
    # nginx.conf CSP for consistency across all deployment modes.
    # COEP intentionally omitted — require-corp breaks cross-origin image loads
    # (e.g. thumbnails from CDNs) which are common in media rippers.

    # Redirect www to bare domain to avoid duplicate content / SEO dilution.
    # Process www.ahoyvpn.com first, then www.ahoyripper.com — if ahoyripper.com
    # comes first in the config, the www.ahoyvpn.com check never fires and that
    # domain's redirect silently falls through (PHP then sees the wrong Host header).
    if ($host = 'www.ahoyvpn.com') {
        return 301 https://ahoyvpn.com$request_uri;
    }
    if ($host = 'www.ahoyripper.com') {
        return 301 https://ahoyripper.com$request_uri;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json text/javascript text/xml application/xml image/svg+xml;

    # Static asset caching — improve LCP for returning visitors.
    # immutable + max-age=31536000 enables efficient browser caching; the
    # noindex tag ensures cached assets don't leak into search indexes.
    location = /src/style.css {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location / {
        add_header Cache-Control "public, max-age=31536000";
    }

    # OpenSearch description — RFC 4112 (auto-discovered by browsers).
    # MIME type must be explicit since nginx's default_type is application/octet-stream.
    location = /opensearch.xml {
        add_header Content-Type "application/opensearchdescription+xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cache-Control "public, max-age=604800";
    }

    # Sitemap — XML sitemap for search engines. Must be text/xml per sitemap.org spec.
    location = /sitemap.xml {
        add_header Content-Type "text/xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cache-Control "public, max-age=86400";
    }

    # security.txt — RFC 9116 requires text/plain MIME type.
    # Browsers and security scanners (GitHub, OpenBugBounty) expect to find
    # the security contact at /.well-known/security.txt and parse it as plain text.
    # Placed before the static asset block so the specific MIME type is set
    # (RFC 9116 recommends text/plain; nginx's default_type would serve it as
    # application/octet-stream without this explicit location).
    location = /.well-known/security.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options nosniff always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # .well-known directory — serve any other files in .well-known with
    # security headers. Specific file types get their correct Content-Type from
    # nginx's mime.types; the above location overrides security.txt explicitly.
    location /.well-known/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # 404 page for non-existent routes
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Source-file access control — order matters in nginx (first match wins):
    # 1. Explicitly allow /src/api.php (used by the frontend JS to call the API).
    #    The = modifier gives exact-match priority over the dotfile catch-all.
    #    fastcgi_pass is explicit here so the block does something concrete rather
    #    than relying on the ~ \.php$ fallback to handle the request silently.
    # 2. Deny all dotfiles (e.g. /src/.env, /.git/config) in one catch-all regex.
    location = /src/api.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;

        # Apply the rate limit zone — 30 r/s burst, returns 503 when exceeded.
        # The generous limit does not affect normal browser usage; it protects
        # against scripted abuse (loops, scrapers) that exceeds human browsing speed.
        limit_req zone=api_limit burst=30 nodelay;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        # Suppress X-Powered-By (PHP version) from being forwarded from PHP-FPM.
        # server_tokens off hides nginx's version, but PHP-FPM still sends
        # X-Powered-By unless explicitly hidden here.
        fastcgi_hide_header X-Powered-By;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        # X-Request-ID enables clients to include the correlation ID in support
        # tickets when reporting issues with the API. PHP's api.php also sets this
        # in its own headers, but nginx provides it here as defense-in-depth so the
        # header is present even if the PHP layer fails to initialize.
        add_header X-Request-ID $http_x_request_id always;
        # CSP for the API — mirrors what PHP's api.php sets programmatically.
        # worker-src 'self' is included to match the PHP-layer CSP and control
        # where ServiceWorkers and SharedWorkers can be loaded from (the API does
        # not serve workers but the directive must be present to prevent browsers
        # from falling back to the default-src). form-action restricts where forms
        # can submit (not applicable to the JSON API but harmless as defense-in-depth).
        # 'upgrade-insecure-requests' included for consistency with the PHP layer
        # and production nginx.conf — it has no practical effect on JSON responses
        # but ensures defense-in-depth parity across all deployment modes.
        # report-to + report-uri ensure CSP violations from API responses are
        # reported to the /csp-report endpoint (matching the server-level policy).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; font-src 'self'; frame-src 'none'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; report-to csp-report; report-uri /csp-report;" always;
    }
    location ~ /\. { deny all; }

    # PHP handling — long timeouts for large media rips
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        # Suppress X-Powered-By (PHP version) from being forwarded from PHP-FPM.
        # PHP-FPM sends this header by default; fastcgi_hide_header prevents it
        # from reaching the client. Matches the hide in the api.php location above.
        fastcgi_hide_header X-Powered-By;
    }

    # Static assets — serve with security headers and long-lived cache.
    # Extensions not covered by the regex below fall through to the catch-all.
    # The root directive is required so nginx can resolve the file path.
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff|woff2|ttf|eot|otf|js|css|json)$ {
        root /app/public;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Catch-all — serve existing files or return 404; apply security headers
    # so this block is not silently unprotected if nginx's server-level headers
    # are ever bypassed by a future location override.
    location / {
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    }
}
