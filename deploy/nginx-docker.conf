server {
    listen 8080 default_server http2;
    server_name _;
    root /app/public;
    index index.php index.html;

    # Hide Nginx version
    server_tokens off;

    # Security headers — COOP/CORP must be at server level so add_header in location
    # blocks inherits them (Nginx does not propagate add_header from child blocks).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Request-ID $http_x_request_id always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;

    # Define the named reporting endpoint group referenced by 'report-to csp-report'
    # in the CSP headers below. Without this, Chromium ignores report-uri and sends
    # violations to an undefined endpoint group — silently discarding all reports.
    add_header Report-To "{\"group\":\"csp-report\",\"max_age\":86400,\"endpoints\":[{\"url\":\"/csp-report\"}]}" always;

    # CSP report-uri receiver — browser POSTs violation reports here.
    # Handler delegates to api.php?action=csp-report so PHP can sanitise and
    # log the report. The POST body is not parsed by nginx (passed as-is).
    location = /csp-report {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 30s;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-Download-Options "noopen" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # CSP — 'upgrade-insecure-requests' is primarily useful for HTML documents
    # (instructs browsers to upgrade HTTP→HTTPS). For the JSON API endpoint this
    # has no effect since API responses are always HTTPS in practice; it is included
    # here for the HTML page (index.php) which nginx also serves at this level.
    # 'frame-ancestors' and 'form-action' are HTML-only but harmless as defense-in-depth.
    # Report-only header mirrors the enforcement policy so CSP violations are logged.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; form-action 'self'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; form-action 'self'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    # COEP intentionally omitted — require-corp breaks cross-origin image loads
    # (e.g. thumbnails from CDNs) which are common in media rippers.

    # Redirect www to bare domain to avoid duplicate content / SEO dilution.
    if ($host = 'www.ahoyripper.com') {
        return 301 https://ahoyripper.com$request_uri;
    }
    if ($host = 'www.ahoyvpn.com') {
        return 301 https://ahoyvpn.com$request_uri;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json text/javascript text/xml application/xml image/svg+xml;

    # Static asset caching — improves LCP for returning visitors.
    # Server-push Link headers are production-only; Docker serves resources
    # directly and doesn't use HTTP/2 server push, so Cache-Control is the
    # primary mechanism for cache-friendly handling of return visits.
    location = /src/style.css {
        add_header Cache-Control "public, max-age=604800";
    }
    location = / {
        add_header Cache-Control "public, max-age=86400";
    }

    # 404 page for non-existent routes
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Source-file access control — order matters in nginx (first match wins):
    # 1. Explicitly allow /src/api.php (used by the frontend JS to call the API).
    #    The = modifier gives exact-match priority over the dotfile catch-all.
    #    fastcgi_pass is explicit here so the block does something concrete rather
    #    than relying on the ~ \.php$ fallback to handle the request silently.
    # 2. Deny all dotfiles (e.g. /src/.env, /.git/config) in one catch-all regex.
    location = /src/api.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header X-Request-ID $http_x_request_id always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        # CSP for the API — mirrors what PHP's api.php sets programmatically.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; font-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    }
    location ~ /\. { deny all; }

    # PHP handling — long timeouts for large media rips
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }
}