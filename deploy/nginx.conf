http {
    # Dynamic PHP-FPM socket detection — works with any phpX-fpm.sock
    # Falls back to the Debian alternatives symlink (/run/php/php-fpm.sock → current
    # default PHP version) so the config works regardless of which PHP version is
    # installed without requiring manual edits.
    map $fastcgi_script_name $php_fpm_socket {
        ~\.php$  unix:/run/php/php-fpm.sock;
        default  unix:/run/php/php-fpm.sock;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version
    server_tokens off;

    # Gzip compression — SVG explicitly included for og-image.svg
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json text/javascript text/xml application/xml image/svg+xml;
}

server {
    listen 80;
    listen [::]:80;
    server_name ahoyripper.com www.ahoyripper.com;
    root /var/www/ahoyripper/public;
    index index.php index.html;

# Security headers (applied to all responses from this server)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Download-Options "noopen" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # COEP intentionally omitted — require-corp breaks cross-origin image loads
    # (e.g. thumbnails from CDNs) which are common in media rippers.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;

    # CSP Reporting API — two mechanisms must both be set for cross-browser support:
    # 1. Reporting-Endpoints (modern, Chromium 94+/Firefox 79+) routes CSP violations
    #    via the browser's Reporting API. Without this, Chromium 94+ silently drops
    #    violations even when 'report-to csp-report' is in the CSP header.
    # 2. Report-To is the legacy fallback (pre-Chromium 94). Kept alongside for older
    #    Chromium versions (84-93) that support report-to but not Reporting-Endpoints.
    # api.php sets both headers so the PHP layer is consistent with nginx.
    add_header Reporting-Endpoints "csp-report=\"/csp-report\"" always;
    add_header Report-To "{\"group\":\"csp-report\",\"max_age\":86400,\"endpoints\":[{\"url\":\"/csp-report\"}]}" always;

    # CSP — 'upgrade-insecure-requests' instructs browsers to upgrade HTTP→HTTPS for
    # the HTML page (no effect on JSON API responses). 'frame-ancestors' and 'form-action'
    # are HTML-only but harmless as defense-in-depth. Report-only header mirrors the
    # enforcement policy so CSP violations are logged without blocking any requests.
    # 'report-uri /csp-report' is included in both headers so violations are reported
    # regardless of which policy the browser applies (enforcement vs Report-Only).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; frame-ancestors 'none'; frame-src 'none'; worker-src 'self'; object-src 'none'; form-action 'self'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    # Report-Only does NOT enforce — directives like upgrade-insecure-requests,
    # frame-ancestors, and form-action have no effect here and are omitted.
    # Reporting-Endpoints enables the modern Reporting API (Chromium 94+, Firefox 79+).
    # Report-To is kept as a fallback for Chromium 84-93. report-uri covers Safari
    # and older Firefox (<79) that support neither modern Reporting API mechanism.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; frame-src 'none'; object-src 'none'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    # Permissions-Policy is set at the server level (line ~37) and applies
    # to all locations including /csp-report — no need to repeat it here.

    # Redirect www to bare domain to avoid duplicate content.
    # Process www.ahoyvpn.com first, then www.ahoyripper.com — if ahoyripper.com
    # comes first in the config, the www.ahoyvpn.com check never fires and that
    # domain's redirect silently falls through (PHP then sees the wrong Host header).
    if ($host = 'www.ahoyvpn.com') {
        return 301 https://ahoyvpn.com$request_uri;
    }
    if ($host = 'www.ahoyripper.com') {
        return 301 https://ahoyripper.com$request_uri;
    }

    # API endpoint — explicit block so security headers are applied by nginx as
    # defense-in-depth even if PHP crashes or fails to set headers. The PHP layer
    # sets the same headers, but this ensures the API never returns a response
    # without X-Robots-Tag, CSP, and COOP/CORP when nginx is the last mile.
    location = /src/api.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;

        # Defense-in-depth security headers for the API — PHP sets these too,
        # but nginx applies them even if the PHP layer fails to initialize.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        # Suppress X-Powered-By (PHP version) from being forwarded from PHP-FPM.
        # server_tokens off hides nginx's version, but PHP-FPM still sends
        # X-Powered-By unless explicitly hidden here.
        fastcgi_hide_header X-Powered-By;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        # X-Request-ID enables clients to include the correlation ID in support
        # tickets when reporting issues with the API. PHP's api.php also sets this
        # in its own headers, but nginx provides it here as defense-in-depth.
        add_header X-Request-ID $http_x_request_id always;
        # worker-src 'self' enables ServiceWorkers and SharedWorkers at the API origin
        # (needed for future PWA offline support). PHP's api.php also sets this in its
        # own CSP header, but nginx provides it here as defense-in-depth.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; frame-ancestors 'none'; frame-src 'none'; worker-src 'self'; object-src 'none'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    }

    # CSP report-uri receiver — browser POSTs violation reports here.
    # Handler delegates to api.php?action=csp-report so PHP can sanitise and
    # log the report. The POST body is not parsed by nginx (passed as-is).
    location = /csp-report {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-Download-Options "noopen" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # X-Request-ID echoes the correlation ID set by api.php so browsers can
        # include it in support tickets when reporting CSP violations. The client
        # also gets this ID on the HTML page (index.php) and API responses.
        add_header X-Request-ID $http_x_request_id always;
        # Suppress X-Powered-By so the PHP version never leaks from this endpoint.
        fastcgi_hide_header X-Powered-By;
        # Reporting-Endpoints and Report-To must be set here in the location block —
        # in nginx, add_header in a location block replaces (not supplements)
        # server-level headers. Without these, browsers posting to /csp-report
        # won't recognise the endpoint as a CSP violation collector.
        add_header Reporting-Endpoints "csp-report=\"/csp-report\"" always;
        add_header Report-To "{\"group\":\"csp-report\",\"max_age\":86400,\"endpoints\":[{\"url\":\"/csp-report\"}]}" always;
        # 'unsafe-inline' is needed for the inline style attribute on the results
        # thumb (style="display:none" set by JS on error). No external scripts
        # are loaded by the API (it returns JSON only).
        # worker-src 'self' is included so ServiceWorkers and SharedWorkers can be
        # created from the API origin (needed for future PWA offline support).
        # report-to and report-uri ensure CSP violations from this endpoint's
        # own responses are reported to the configured collector.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; font-src 'self'; frame-src 'none'; worker-src 'self'; object-src 'none'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    }

    # PHP handling — long timeouts for large media rips
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    location ~ /\. { deny all; add_header X-Content-Type-Options "nosniff" always; }

    # Server push for critical above-the-fold resources — reduces round-trips
    # and improves LCP (Largest Contentful Paint) for first-time visitors.
    # Push is hint-based; clients may ignore or upgrade to early-hints preloading.
    # Gated on GET only — preloading on POST/OPTIONS/etc. is wasted overhead.
    # Cache-Control on both locations improves LCP for returning visitors.
    location = /src/style.css {
        add_header Link "</src/style.css>; rel=preload; as=style" always;
        add_header Cache-Control "public, max-age=604800";
    }
    # Google Fonts is a render-blocking resource — push it early to reduce FCP delay.
    # The crossorigin attribute is required on the link tag for CORS requests; the
    # preload hint must match to ensure the browser uses the pre-pushed response.
    # HTTPS is guaranteed for this domain (HSTS preloaded), so no mixed-content risk.
    # Only push on GET — fonts are not needed for non-GET responses.
    # Note: HTTP Link header syntax requires crossorigin="anonymous" (not just
    # "crossorigin" as a boolean) since Link: header params are quoted name=value pairs.
    location = / {
        add_header Link "<https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap>; rel=preload; as=style; crossorigin=\"anonymous\"" always;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
    }

    # 404 page for non-existent routes — inherits server-level headers but
    # add explicit security headers since this is an internal redirect that
    # bypasses the PHP stack and may not propagate all server-level headers.
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # X-Request-ID carries nginx's $request_id so 404 responses are
        # correlatable in server-side logs even when the request never reaches
        # the PHP layer (static asset 404s, unknown routes, etc.).
        add_header X-Request-ID $request_id always;
    }

    # security.txt — RFC 9116 requires text/plain MIME type.
    # Browsers and security scanners (GitHub, OpenBugBounty) expect to find
    # the security contact at /.well-known/security.txt and parse it as plain text.
    # Placed before the static asset block so the specific MIME type is set
    # (RFC 9116 recommends text/plain; nginx's default_type would serve it as
    # application/octet-stream without this explicit location).
    location = /.well-known/security.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options nosniff always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # .well-known directory — serve any other files in .well-known with
    # security headers. Specific file types get their correct Content-Type from
    # nginx's mime.types; the above location overrides security.txt explicitly.
    location /.well-known/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # OpenSearch description — RFC 4112 (auto-discovered by browsers).
    # MIME type must be explicit since nginx's default_type is application/octet-stream.
    location = /opensearch.xml {
        add_header Content-Type "application/opensearchdescription+xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cache-Control "public, max-age=604800";
    }

    # Sitemap — XML sitemap for search engines. Must be text/xml per sitemap.org spec.
    location = /sitemap.xml {
        add_header Content-Type "text/xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cache-Control "public, max-age=86400";
    }

    # Static assets (images, fonts, JS, CSS) — apply core security headers so
    # they are served with the same defense-in-depth as dynamic responses.
    # The noindex directive prevents search engines from indexing asset URLs
    # (e.g. CDN paths) that might appear in server logs or referer headers.
    # immutable + max-age=31536000 enables efficient browser caching; the
    # noindex tag ensures cached assets don't leak into search indexes.
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff|woff2|ttf|eot|otf|js|css|json)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static assets (catch-all) — serve any remaining static files with
    # consistent security headers. Extends the above specific extension
    # block to cover any file types not explicitly listed above.
    location / {
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    }

    # Logs
    access_log /var/log/nginx/ahoyripper_access.log;
    error_log  /var/log/nginx/ahoyripper_error.log;
}