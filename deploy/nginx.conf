http {
    # Dynamic PHP-FPM socket detection — works with any phpX-fpm.sock
    # Falls back to a version-agnostic symlink when available
    map $fastcgi_script_name $php_fpm_socket {
        ~\.php$  unix:/run/php/php-fpm.sock;
        default  unix:/var/run/php/php8.3-fpm.sock;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers (applied to all responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://ahoyvpn.com https://ahoyvpn.net https://*.ahoyvpn.com https://*.ahoyvpn.net; connect-src 'self';" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # PHP handling — long timeouts for large media rips
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # Allow /src/api.php (used by the frontend JS), deny everything else in /src/
    location = /src/api.php { }
    location ~ ^/src/  { deny all; }
    location ~ ^/includes/ { deny all; }
    location ~ ^/scripts/ { deny all; }

    # Static assets
    location / {
        try_files $uri $uri/ =404;
    }

    # Logs
    access_log /var/log/nginx/ahoyripper_access.log;
    error_log  /var/log/nginx/ahoyripper_error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name ahoyripper.com www.ahoyripper.com;
    root /var/www/ahoyripper/public;
    index index.php index.html;
}