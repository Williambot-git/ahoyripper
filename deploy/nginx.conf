http {
    # Dynamic PHP-FPM socket detection — works with any phpX-fpm.sock
    # Falls back to the Debian alternatives symlink (/run/php/php-fpm.sock → current
    # default PHP version) so the config works regardless of which PHP version is
    # installed without requiring manual edits.
    map $fastcgi_script_name $php_fpm_socket {
        ~\.php$  unix:/run/php/php-fpm.sock;
        default  unix:/run/php/php-fpm.sock;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version
    server_tokens off;

    # Gzip compression — SVG explicitly included for og-image.svg
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json text/javascript text/xml application/xml image/svg+xml;
}

server {
    listen 80;
    listen [::]:80;
    server_name ahoyripper.com www.ahoyripper.com;
    root /var/www/ahoyripper/public;
    index index.php index.html;

# Security headers (applied to all responses from this server)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Request-ID $http_x_request_id always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # COEP intentionally omitted — require-corp breaks cross-origin image loads
    # (e.g. thumbnails from CDNs) which are common in media rippers.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;

    # Define the named reporting endpoint group referenced by 'report-to csp-report'
    # in the CSP headers below. Without this, Chromium ignores report-uri and sends
    # violations to an undefined endpoint group — silently discarding all reports.
    add_header Report-To "{\"group\":\"csp-report\",\"max_age\":86400,\"endpoints\":[{\"url\":\"/csp-report\"}]}" always;

    # CSP report-uri receiver — browser POSTs violation reports here.
    # Handler delegates to api.php?action=csp-report so PHP can sanitise and
    # log the report. The POST body is not parsed by nginx (passed as-is).
    location = /csp-report {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-Download-Options "noopen" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # CSP — 'upgrade-insecure-requests' instructs browsers to upgrade HTTP→HTTPS for
    # the HTML page (no effect on JSON API responses). 'frame-ancestors' and 'form-action'
    # are HTML-only but harmless as defense-in-depth. Report-only header mirrors the
    # enforcement policy so CSP violations are logged without blocking any requests.
    # 'report-uri /csp-report' is included in both headers so violations are reported
    # regardless of which policy the browser applies (enforcement vs Report-Only).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; upgrade-insecure-requests; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; form-action 'self'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;
    # Report-Only does NOT enforce — directives like upgrade-insecure-requests,
    # frame-ancestors, and form-action have no effect here and are omitted.
    # report-to csp-report enables the modern Reporting API (Chromium 84+).
    # report-uri is kept for Firefox <79 compatibility alongside report-to.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; frame-src 'none'; object-src 'none'; base-uri 'self'; report-to csp-report; report-uri /csp-report;" always;

    # Redirect www to bare domain to avoid duplicate content.
    # Process www.ahoyvpn.com first, then www.ahoyripper.com — if ahoyripper.com
    # comes first in the config, the www.ahoyvpn.com check never fires and that
    # domain's redirect silently falls through (PHP then sees the wrong Host header).
    if ($host = 'www.ahoyvpn.com') {
        return 301 https://ahoyvpn.com$request_uri;
    }
    if ($host = 'www.ahoyripper.com') {
        return 301 https://ahoyripper.com$request_uri;
    }

    # API endpoint — explicit block so security headers are applied by nginx as
    # defense-in-depth even if PHP crashes or fails to set headers. The PHP layer
    # sets the same headers, but this ensures the API never returns a response
    # without X-Robots-Tag, CSP, and COOP/CORP when nginx is the last mile.
    location = /src/api.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;

        # Defense-in-depth security headers for the API — PHP sets these too,
        # but nginx applies them even if the PHP layer fails to initialize.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        # Suppress X-Powered-By (PHP version) from being forwarded from PHP-FPM.
        # server_tokens off hides nginx's version, but PHP-FPM still sends
        # X-Powered-By unless explicitly hidden here.
        fastcgi_hide_header X-Powered-By;
        add_header X-Request-ID $http_x_request_id always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        # CSP for the API — mirrors what PHP's api.php sets programmatically.
        # 'unsafe-inline' is needed for the inline style attribute on the results
        # thumb (style="display:none" set by JS on error). No external scripts
        # are loaded by the API (it returns JSON only).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; font-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    }

    # PHP handling — long timeouts for large media rips
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    location ~ /\. { deny all; add_header X-Content-Type-Options "nosniff" always; }

    # Server push for critical above-the-fold resources — reduces round-trips
    # and improves LCP (Largest Contentful Paint) for first-time visitors.
    # Push is hint-based; clients may ignore or upgrade to early-hints preloading.
    # Gated on GET only — preloading on POST/OPTIONS/etc. is wasted overhead.
    # Cache-Control on both locations improves LCP for returning visitors.
    location = /src/style.css {
        add_header Link "</src/style.css>; rel=preload; as=style" always;
        add_header Cache-Control "public, max-age=604800";
    }
    # Google Fonts is a render-blocking resource — push it early to reduce FCP delay.
    # The crossorigin attribute is required on the link tag for CORS requests; the
    # preload hint must match to ensure the browser uses the pre-pushed response.
    # HTTPS is guaranteed for this domain (HSTS preloaded), so no mixed-content risk.
    # Only push on GET — fonts are not needed for non-GET responses.
    # Note: HTTP Link header syntax requires crossorigin="anonymous" (not just
    # "crossorigin" as a boolean) since Link: header params are quoted name=value pairs.
    location = / {
        add_header Link "<https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap>; rel=preload; as=style; crossorigin=\"anonymous\"" always;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Robots-Tag "index, follow" always;
    }

    # 404 page for non-existent routes — inherits server-level headers but
    # add explicit security headers since this is an internal redirect that
    # bypasses the PHP stack and may not propagate all server-level headers.
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Static assets (images, fonts, JS, CSS) — apply core security headers so
    # they are served with the same defense-in-depth as dynamic responses.
    # The noindex directive prevents search engines from indexing asset URLs
    # (e.g. CDN paths) that might appear in server logs or referer headers.
    # immutable + max-age=31536000 enables efficient browser caching; the
    # noindex tag ensures cached assets don't leak into search indexes.
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff|woff2|ttf|eot|otf|js|css)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static assets (catch-all) — serve any remaining static files with
    # consistent security headers. Extends the above specific extension
    # block to cover any file types not explicitly listed above.
    location / {
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Download-Options "noopen" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, noai, noimage, noydir" always;
    }

    # Logs
    access_log /var/log/nginx/ahoyripper_access.log;
    error_log  /var/log/nginx/ahoyripper_error.log;
}