server {
    listen 80;
    listen [::]:80;
    server_name ahoyripper.com www.ahoyripper.com;
    root /var/www/ahoyripper/public;
    index index.php index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://ahoyvpn.com https://ahoyvpn.net; connect-src 'self';" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # PHP handling
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        # Long timeouts for big rips
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # Deny access to sensitive files
    location ~ /\. { deny all; }
    location ~ ^/(src|includes|scripts)/.*\.php$ { deny all; }

    # Static assets
    location / {
        try_files $uri $uri/ =404;
    }

    location /src/ {
        internal;  # Only accessible via internal rewrite, download proxied
    }

    # Logs
    access_log /var/log/nginx/ahoyripper_access.log;
    error_log /var/log/nginx/ahoyripper_error.log;
}