http {
    # Dynamic PHP-FPM socket detection — works with any phpX-fpm.sock
    # Falls back to a version-agnostic symlink when available
    map $fastcgi_script_name $php_fpm_socket {
        ~\.php$  unix:/run/php/php-fpm.sock;
        default  unix:/var/run/php/php8.3-fpm.sock;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version
    server_tokens off;

    # Gzip compression — SVG explicitly included for og-image.svg
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}

server {
    listen 80;
    listen [::]:80;
    server_name ahoyripper.com www.ahoyripper.com;
    root /var/www/ahoyripper/public;
    index index.php index.html;

# Security headers (applied to all responses from this server)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Request-ID $http_x_request_id always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # COEP intentionally omitted — require-corp breaks cross-origin image loads
    # (e.g. thumbnails from CDNs) which are common in media rippers.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.ytimg.com https://*.tikcdn.com https://pbs.twimg.com https://*.twimg.com https://*.sndcdn.com https://*.vimeocdn.com https://*.instagram.com https://*.fbcdn.net https://v16.tiktokcdn.com https://v26.tiktokcdn.com https://*.tiktok.com https://vxtiktok.com https://*.mediaJx.com; connect-src 'self' https://ahoyripper.com; frame-src 'none'; object-src 'none'; form-action 'self'; base-uri 'self';" always;

    # Redirect www to bare domain to avoid duplicate content
    if ($host = 'www.ahoyripper.com') {
        return 301 https://ahoyripper.com$request_uri;
    }
    if ($host = 'www.ahoyvpn.com') {
        return 301 https://ahoyvpn.com$request_uri;
    }

    # PHP handling — long timeouts for large media rips
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass $php_fpm_socket;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # Allow /src/api.php (used by the frontend JS); dotfile catch-all (below) handles
    # all dotdir access control. Explicit prefix deny rules are redundant since
    # the dotfile catch-all handles /src/, /includes/, and /scripts/ correctly —
    # keeping the config minimal avoids confusion about overlapping rules.
    location = /src/api.php { }
    location ~ /\. { deny all; }

    # Server push for critical above-the-fold resources — reduces round-trips
    # and improves LCP (Largest Contentful Paint) for first-time visitors.
    # Push is hint-based; clients may ignore or upgrade to early-hints preloading.
    # Gated on GET only — preloading on POST/OPTIONS/etc. is wasted overhead.
    # Cache-Control on both locations improves LCP for returning visitors.
    location = /src/style.css {
        add_header Link "</src/style.css>; rel=preload; as=style" always;
        add_header Cache-Control "public, max-age=604800";
    }
    # Google Fonts is a render-blocking resource — push it early to reduce FCP delay.
    # The crossorigin attribute is required on the link tag for CORS requests; the
    # preload hint must match to ensure the browser uses the pre-pushed response.
    # HTTPS is guaranteed for this domain (HSTS preloaded), so no mixed-content risk.
    # Only push on GET — fonts are not needed for non-GET responses.
    location = / {
        add_header Link "<https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap>; rel=preload; as=style; crossorigin" always;
        add_header Cache-Control "public, max-age=86400";
    }

    # 404 page for non-existent routes
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Static assets
    location / {
        try_files $uri $uri/ =404;
    }

    # Logs
    access_log /var/log/nginx/ahoyripper_access.log;
    error_log  /var/log/nginx/ahoyripper_error.log;
}